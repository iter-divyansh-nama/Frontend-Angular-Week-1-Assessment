<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visionary</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">Visionary</div>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="#">Home</a></li>
    <li><a href="#">Team</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Building the future together</h1>
  <p>Our mission is to empower teams with the best tools and talent.</p>
</section>

<section class="team-section">
  <h2>Meet Our Team</h2>
  <div class="team-grid" id="teamGrid"></div>
</section>

<footer class="footer">
  <div class="footer-left">Visionary</div>
  <div class="footer-center">© 2026 Visionary Inc. All rights reserved.</div>
  <div class="footer-right">
    <a href="#">Twitter</a>
    <a href="#">LinkedIn</a>
    <a href="#">GitHub</a>
  </div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap"><img id="modalImg" src="" alt=""/></div>
    <h2 id="modalName"></h2>
    <p class="modal-role" id="modalRole"></p>
    <p class="modal-bio" id="modalBio"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
